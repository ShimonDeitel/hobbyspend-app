name: Hobbyspend
options:
  bundleIdPrefix: com.shimondeitel.hobbyspend
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Hobbyspend:
    type: application
    platform: iOS
    sources:
      - path: Hobbyspend
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.hobbyspend
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Hobbyspend/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  HobbyspendTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HobbyspendTests
      - path: Hobbyspend.storekit
    dependencies:
      - target: Hobbyspend
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.hobbyspend.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  HobbyspendUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: HobbyspendUITests
    dependencies:
      - target: Hobbyspend
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.hobbyspend.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Hobbyspend:
    build:
      targets:
        Hobbyspend: all
        HobbyspendTests: [test]
        HobbyspendUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Hobbyspend.storekit
    test:
      config: Debug
      storeKitConfiguration: Hobbyspend.storekit
      targets:
        - HobbyspendTests
        - HobbyspendUITests
    archive:
      config: Release
